name: Download and Release

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: "Download URL"
        default: "https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/jquery-speedtest/100MB.txt"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare environment
        run: |
          sudo apt update
          sudo apt install internetarchive
          sudo mkdir -p /mnt/workspace
          sudo chown $USER:$USER /mnt/workspace

      - name: Download file
        working-directory: /mnt/workspace
        run: |
          wget --no-check-certificate --content-disposition "${{ github.event.inputs.download_url }}"

      - name: Get file name
        working-directory: /mnt/workspace
        run: |
          FILE_NAME=$(ls)
          echo "FILE_NAME=$FILE_NAME" >> "$GITHUB_ENV"
      
      - name: Configurar credenciales de Internet Archive
        run: |
          ia configure --username "dripzurek@protonmail.com" --password "@Dripzurek"

      - name: Subir archivo a Internet Archive
        working-directory: /mnt/workspace
        run: |
          # Se obtiene la fecha actual en formato YYYYMMDD
          DATE=$(date +'%Y%m%d')
          # Se crea un identificador seguro a partir del nombre del archivo:
          # 1. Convertir a minúsculas.
          # 2. Reemplazar cualquier carácter que no sea alfanumérico, punto, guion bajo o guion por un guion.
          # 3. Remover guiones, puntos o guiones bajos al inicio.
          SAFE_IDENTIFIER=$(echo "$FILE_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g' | sed -E 's/^[._-]+//')
          # Se construye el identificador final agregándole la fecha.
          IDENTIFIER="${SAFE_IDENTIFIER}-${DATE}"
          echo "Identifier generado: $IDENTIFIER"
          # Subida del archivo con el título igual al nombre original y asignación a la colección opensource_media.
          ia upload "$IDENTIFIER" "$FILE_NAME" --metadata="title:$FILE_NAME" --metadata="collection:opensource_media"
