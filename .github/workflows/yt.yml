name: Upload Video to YouTube

on:
  workflow_dispatch:

jobs:
  upload-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install --upgrade google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client requests oauth2client

      - name: Setup credentials
        run: echo '{"installed":{"client_id":"804380424757-8euu2587msaq2hd7nl3ih7o7u57mjke2.apps.googleusercontent.com","project_id":"extended-study-455520-d5","auth_uri":"https://accounts.google.com/o/oauth2/auth","token_uri":"https://oauth2.googleapis.com/token","auth_provider_x509_cert_url":"https://www.googleapis.com/oauth2/v1/certs","client_secret":"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","redirect_uris":["http://localhost"]}}' > client_secrets.json

      - name: Run script
        run: python script.py
