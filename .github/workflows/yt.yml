name: Upload Video to YouTube

on:
  workflow_dispatch:

jobs:
  upload-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Prepare environment
        run: |
          sudo mkdir -p /mnt/workspace
          sudo chown $USER:$USER /mnt/workspace

      - name: Install dependencies
        run: pip install --upgrade google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client requests oauth2client tqdm && sudo apt update && sudo apt install ffmpeg

      - name: Download authentication files
        working-directory: /mnt/workspace
        run: |
          wget https://github.com/mazurikian/test/raw/refs/heads/main/oauth2.json
          wget https://github.com/mazurikian/test/raw/refs/heads/main/script.py

      - name: Get video duration and split points
        working-directory: /mnt/workspace
        run: |
          # Get the playlist and find the last .ts file before the midpoint
          wget "https://stream.kick.com/ivs/v1/196233775518/V3f9DWwe2lks/2025/4/1/16/15/JwdvOAppHrfG/media/hls/1080p60/playlist.m3u8" -O playlist.m3u8
          
          # Count total segments
          TOTAL_SEGMENTS=$(grep -c '.ts' playlist.m3u8)
          HALF_SEGMENT=$((TOTAL_SEGMENTS / 2))
          
          # Find the last segment before midpoint
          SPLIT_SEGMENT=$(head -n $((HALF_SEGMENT + 1)) playlist.m3u8 | grep '.ts' | tail -n 1)
          
          # Save segment names for splitting
          echo "SPLIT_SEGMENT=$SPLIT_SEGMENT" >> $GITHUB_ENV
          echo "TOTAL_SEGMENTS=$TOTAL_SEGMENTS" >> $GITHUB_ENV

      - name: Download and process first half
        working-directory: /mnt/workspace
        run: |
          # Download segments up to the split point
          ffmpeg -i "https://stream.kick.com/ivs/v1/196233775518/V3f9DWwe2lks/2025/4/1/16/15/JwdvOAppHrfG/media/hls/1080p60/playlist.m3u8" \
          -c copy \
          -multiple_requests 1 \
          -rtbufsize 100M \
          -thread_queue_size 512 \
          -http_persistent 1 \
          -t $(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "https://stream.kick.com/ivs/v1/196233775518/V3f9DWwe2lks/2025/4/1/16/15/JwdvOAppHrfG/media/hls/1080p60/${{ env.SPLIT_SEGMENT }}") \
          part1.ts

      - name: Upload first half
        working-directory: /mnt/workspace
        run: |
          python script.py part1.ts "Vector | 01/04/2025 (Parte 1)" "PRIMERA PARTE: HOY VENDEMOS DROGUITA RICA 🌿 + NUEVO JUEGO DE TERROR DE ASTRONAUTAS 🚀  - !duelbits !kingslv !skinclub !crew - META SUBS: 103/110 https://kick.com/vector/videos/97f4321b-9ef0-4383-b8e8-9e9ad83c6308"

      - name: Clean up first half
        working-directory: /mnt/workspace
        run: rm -f part1.ts

      - name: Download and process second half
        working-directory: /mnt/workspace
        run: |
          # Download segments from split point to end
          ffmpeg -i "https://stream.kick.com/ivs/v1/196233775518/V3f9DWwe2lks/2025/4/1/16/15/JwdvOAppHrfG/media/hls/1080p60/playlist.m3u8" \
          -c copy \
          -multiple_requests 1 \
          -rtbufsize 100M \
          -thread_queue_size 512 \
          -http_persistent 1 \
          -ss $(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "https://stream.kick.com/ivs/v1/196233775518/V3f9DWwe2lks/2025/4/1/16/15/JwdvOAppHrfG/media/hls/1080p60/${{ env.SPLIT_SEGMENT }}") \
          part2.ts

      - name: Upload second half
        working-directory: /mnt/workspace
        run: |
          python script.py part2.ts "Vector | 01/04/2025 (Parte 2)" "SEGUNDA PARTE: HOY VENDEMOS DROGUITA RICA 🌿 + NUEVO JUEGO DE TERROR DE ASTRONAUTAS 🚀  - !duelbits !kingslv !skinclub !crew - META SUBS: 103/110 https://kick.com/vector/videos/97f4321b-9ef0-4383-b8e8-9e9ad83c6308"

      - name: Clean up second half
        working-directory: /mnt/workspace
        run: rm -f part2.ts
