name: Upload Video to YouTube

on:
  workflow_dispatch:

jobs:
  upload-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Prepare environment
        run: |
          sudo mkdir -p /mnt/workspace
          sudo chown $USER:$USER /mnt/workspace

      - name: Install dependencies
        run: |
          pip install --upgrade google-auth google-auth-oauthlib google-auth-httplib2 \
          google-api-python-client requests oauth2client tqdm
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Get video duration
        working-directory: /mnt/workspace
        run: |
          # Obtener duración sin descargar completo
          duration=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "https://stream.kick.com/ivs/v1/196233775518/V3f9DWwe2lks/2025/4/1/16/15/JwdvOAppHrfG/media/hls/1080p60/playlist.m3u8")
          half_duration=$(echo "$duration / 2" | bc -l)
          echo "HALF_DURATION=$half_duration" >> $GITHUB_ENV

      - name: Process and upload first half
        working-directory: /mnt/workspace
        run: |
          # Descargar y procesar primera mitad
          ffmpeg -i "https://stream.kick.com/ivs/v1/196233775518/V3f9DWwe2lks/2025/4/1/16/15/JwdvOAppHrfG/media/hls/1080p60/playlist.m3u8" \
          -t ${{ env.HALF_DURATION }} \
          -c copy \
          part1.ts
          
          wget https://github.com/mazurikian/test/raw/main/oauth2.json
          wget https://github.com/mazurikian/test/raw/main/script.py
          
          python script.py part1.ts "Parte 1/2"
          rm part1.ts

      - name: Process and upload second half
        working-directory: /mnt/workspace
        run: |
          # Descargar y procesar segunda mitad
          ffmpeg -i "https://stream.kick.com/ivs/v1/196233775518/V3f9DWwe2lks/2025/4/1/16/15/JwdvOAppHrfG/media/hls/1080p60/playlist.m3u8" \
          -ss ${{ env.HALF_DURATION }} \
          -c copy \
          part2.ts
          
          python script.py part2.ts "Parte 2/2"
          rm part2.ts
