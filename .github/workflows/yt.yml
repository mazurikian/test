name: Upload Video to YouTube

on:
  workflow_dispatch:

jobs:
  upload-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup environment
        run: |
          sudo mkdir -p /mnt/workspace
          sudo chown $USER:$USER /mnt/workspace
          sudo apt update
          sudo apt install -y jq ffmpeg

      - name: Get TS fragments
        working-directory: /mnt/workspace
        run: |
          # Descargar playlist principal
          wget "https://stream.kick.com/ivs/v1/196233775518/V3f9DWwe2lks/2025/4/1/16/15/JwdvOAppHrfG/media/hls/1080p60/playlist.m3u8" -O master.m3u8

          # Obtener playlist de fragmentos
          TS_PLAYLIST_URL=$(grep -v '#' master.m3u8 | head -n 1)
          wget "$TS_PLAYLIST_URL" -O chunks.m3u8

          # Calcular punto medio
          TOTAL_DURATION=$(grep '#EXTINF' chunks.m3u8 | cut -d: -f2 | cut -d, -f1 | paste -sd+ | bc)
          HALF_DURATION=$(echo "$TOTAL_DURATION / 2" | bc)

          # Identificar último fragmento antes de la mitad
          CURRENT_TIME=0
          LAST_TS=""
          while IFS= read -r line; do
            if [[ $line == \#EXTINF* ]]; then
              DURATION=$(echo "$line" | cut -d: -f2 | cut -d, -f1)
              CURRENT_TIME=$(echo "$CURRENT_TIME + $DURATION" | bc)
              if (( $(echo "$CURRENT_TIME > $HALF_DURATION" | bc -l) )); then
                break
              fi
              LAST_TS="$NEXT_TS"
            elif [[ $line != \#* ]]; then
              NEXT_TS="$line"
            fi
          done < chunks.m3u8

          # Descargar fragmentos
          wget -i <(grep -B 1 "$LAST_TS" chunks.m3u8 | grep -v '#' | head -n 1) -O part1.ts
          wget -i <(grep -A 9999 "$LAST_TS" chunks.m3u8 | grep -v '#' | tail -n +2) -O part2.ts

      - name: Upload parts
        working-directory: /mnt/workspace
        run: |
          wget https://github.com/mazurikian/test/raw/main/oauth2.json
          wget https://github.com/mazurikian/test/raw/main/script.py

          # Subir primera parte
          python script.py part1.ts "Parte 1/2"
          rm -f part1.ts

          # Subir segunda parte
          python script.py part2.ts "Parte 2/2"
          rm -f part2.ts
