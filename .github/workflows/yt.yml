name: Upload Video to YouTube

on:
  workflow_dispatch:

jobs:
  upload-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup environment
        run: |
          sudo mkdir -p /mnt/workspace
          sudo chown $USER:$USER /mnt/workspace
          sudo apt update
          sudo apt install -y jq ffmpeg

      - name: Get TS fragments
        working-directory: /mnt/workspace
        run: |
          # Definir URL base del stream
          STREAM_URL="https://stream.kick.com/ivs/v1/196233775518/V3f9DWwe2lks/2025/4/1/16/15/JwdvOAppHrfG/media/hls/1080p60/"
          
          # Descargar playlist principal
          wget "${STREAM_URL}playlist.m3u8" -O master.m3u8

          # Extraer URL de la variante de mejor calidad
          TS_PLAYLIST_URL=$(grep -v '#' master.m3u8 | head -n 1)
          wget "${STREAM_URL}${TS_PLAYLIST_URL}" -O chunks.m3u8

          # Extraer URL base para fragmentos
          BASE_URL="${STREAM_URL%/*}/"
          
          # Calcular punto medio
          TOTAL_DURATION=$(grep '#EXTINF' chunks.m3u8 | cut -d: -f2 | cut -d, -f1 | paste -sd+ | bc)
          HALF_DURATION=$(echo "$TOTAL_DURATION / 2" | bc)

          # Procesar fragmentos
          CURRENT_TIME=0
          while IFS= read -r line; do
            if [[ $line == \#EXTINF* ]]; then
              DURATION=$(echo "$line" | cut -d: -f2 | cut -d, -f1)
              CURRENT_TIME=$(echo "$CURRENT_TIME + $DURATION" | bc)
              if (( $(echo "$CURRENT_TIME > $HALF_DURATION" | bc -l) )); then
                break
              fi
            elif [[ $line != \#* ]]; then
              if [[ -z "$FIRST_HALF_LAST_TS" ]]; then
                FIRST_HALF_LAST_TS="$line"
              fi
              NEXT_TS="$line"
            fi
          done < chunks.m3u8

          # Descargar partes
          echo "Descargando primera mitad..."
          grep -B 1000 "$FIRST_HALF_LAST_TS" chunks.m3u8 | grep -v '#' | xargs -I {} wget "${BASE_URL}{}" -O part1.ts
          
          echo "Descargando segunda mitad..."
          grep -A 1000 -m 1 "$FIRST_HALF_LAST_TS" chunks.m3u8 | grep -v '#' | tail -n +2 | xargs -I {} wget "${BASE_URL}{}" -O part2.ts

      - name: Upload parts
        working-directory: /mnt/workspace
        run: |
          wget https://github.com/mazurikian/test/raw/main/oauth2.json
          wget https://github.com/mazurikian/test/raw/main/script.py

          # Subir primera parte
          python script.py part1.ts "Parte 1/2"
          rm -f part1.ts

          # Subir segunda parte
          python script.py part2.ts "Parte 2/2"
          rm -f part2.ts
