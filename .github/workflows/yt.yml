name: Upload Video to YouTube

on:
  workflow_dispatch:

jobs:
  upload-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Prepare environment
        run: |
          sudo mkdir -p /mnt/workspace
          sudo chown $USER:$USER /mnt/workspace

      - name: Install dependencies
        run: |
          pip install --upgrade google-auth google-auth-oauthlib google-auth-httplib2 \
          google-api-python-client requests oauth2client tqdm
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Get video metadata
        working-directory: /mnt/workspace
        id: get_meta
        run: |
          duration=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "https://stream.kick.com/ivs/v1/196233775518/V3f9DWwe2lks/2025/4/1/16/15/JwdvOAppHrfG/media/hls/1080p60/playlist.m3u8")
          half_point=$(echo "$duration / 2" | bc -l)
          keyframe=$(ffprobe -read_intervals $half_point%+1 -show_frames "https://stream.kick.com/ivs/v1/196233775518/V3f9DWwe2lks/2025/4/1/16/15/JwdvOAppHrfG/media/hls/1080p60/playlist.m3u8" 2>&1 | grep -oP 'pkt_pts_time=\K\d+\.\d+' | head -1 || echo $half_point)
          
          # Usar outputs de steps en lugar de variables de entorno
          echo "split_point=$(printf "%.3f" $keyframe)" >> $GITHUB_OUTPUT
          echo "duration=$(printf "%.3f" $duration)" >> $GITHUB_OUTPUT

      - name: Process first segment
        working-directory: /mnt/workspace
        run: |
          ffmpeg -ss 0 -to ${{ steps.get_meta.outputs.split_point }} \
          -i "https://stream.kick.com/ivs/v1/196233775518/V3f9DWwe2lks/2025/4/1/16/15/JwdvOAppHrfG/media/hls/1080p60/playlist.m3u8" \
          -c copy \
          -avoid_negative_ts make_zero \
          part1.ts
          
          wget https://github.com/mazurikian/test/raw/main/oauth2.json
          wget https://github.com/mazurikian/test/raw/main/script.py

          python script.py part1.ts "Parte 1/2"
          rm -f part1.ts

      - name: Process second segment
        working-directory: /mnt/workspace
        run: |
          ffmpeg -ss ${{ steps.get_meta.outputs.split_point }} \
          -i "https://stream.kick.com/ivs/v1/196233775518/V3f9DWwe2lks/2025/4/1/16/15/JwdvOAppHrfG/media/hls/1080p60/playlist.m3u8" \
          -c copy \
          -avoid_negative_ts make_zero \
          part2.ts

          python script.py part2.ts "Parte 2/2"
          rm -f part2.ts
